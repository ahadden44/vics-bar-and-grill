<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Contact — Vic's Bar & Grill</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <h1 class="brand">Vic's Bar & Grill</h1>
        <nav>
          <ul class="nav">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container contact-page">
      <h2>Contact Us</h2>
      <p>Call or email to make a reservation or book an event.</p>

      <ul class="contact-info">
        <li><strong>Phone:</strong> (555) 123-4567</li>
        <li><strong>Email:</strong> info@vicsbarandgrill.example</li>
        <li><strong>Address:</strong> 7900 Example St, City, State</li>
      </ul>

      <h3>Send a message</h3>
      <form class="contact-form" action="#" method="post">
        <label>
          Name
          <input type="text" name="name" required />
        </label>
        <label>
          Email
          <input type="email" name="email" required />
        </label>
        <label>
          Message
          <textarea name="message" rows="5" required></textarea>
        </label>
        <button class="btn" type="submit">Send</button>
      </form>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>© <span id="year"></span> Vic's Bar & Grill</p>
      </div>
    </footer>

    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  </body>
</html>
